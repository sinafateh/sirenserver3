<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود — Siren Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1e1e2f, #0a0a0f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .glass-card {
            background: rgba(30,30,40,0.5);
            backdrop-filter: blur(25px);
            border-radius: 48px;
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        h2 {
            font-size: 32px;
            font-weight: 590;
            background: linear-gradient(135deg, #ffffff, #bfbfd4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            font-size: 17px;
            background: rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 44px;
            color: #ffffff;
            outline: none;
        }
        input:focus {
            border-color: #0a84ff;
            box-shadow: 0 0 0 4px rgba(10,132,255,0.2);
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button {
            width: 100%;
            padding: 16px;
            background: #0a84ff;
            border: none;
            border-radius: 44px;
            font-size: 18px;
            font-weight: 590;
            color: #fff;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        button:hover { background: #0063ce; transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-box {
            background: rgba(255,69,58,0.15);
            border: 0.5px solid #ff453a;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 18px;
            color: #ff453a;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .info-text {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .info-text strong { color: #ffffff; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>🔐 Siren Tester</h2>
        <div id="errorBox" class="error-box">❌ نام کاربری یا رمز عبور اشتباه است</div>

        <form id="loginForm">
            <input type="text" id="username" placeholder="نام کاربری" required autocomplete="username" value="sina">
            <input type="password" id="password" placeholder="رمز عبور" required autocomplete="current-password" value="sina">
            <button type="submit" id="loginBtn">
                <span id="loginText">ورود</span>
                <span id="loginLoader" style="display:none;" class="loading"></span>
            </button>
        </form>

        <div class="info-text">
            <p>👤 کاربر پیش‌فرض: <strong>sina</strong></p>
            <p>🔑 رمز: <strong>sina</strong></p>
        </div>
    </div>

    <script>
        // ==================== Login ====================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorBox = document.getElementById('errorBox');
            var loginBtn = document.getElementById('loginBtn');
            var loginText = document.getElementById('loginText');
            var loginLoader = document.getElementById('loginLoader');

            errorBox.style.display = 'none';
            loginBtn.disabled = true;
            loginText.textContent = 'در حال ورود...';
            loginLoader.style.display = 'inline-block';

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(response) {
                // استفاده از .json() که معادل JSON.parse هست، نه eval
                return response.json().then(function(data) {
                    if (!response.ok) {
                        throw new Error(data.detail || 'خطا در ورود');
                    }
                    return data;
                });
            })
            .then(function(data) {
                localStorage.setItem('session_id', data.session_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('is_admin', data.is_admin);
                window.location.href = '/dashboard';
            })
            .catch(function(error) {
                errorBox.textContent = '❌ ' + error.message;
                errorBox.style.display = 'block';
                loginBtn.disabled = false;
                loginText.textContent = 'ورود';
                loginLoader.style.display = 'none';
            });
        });
    </script>
</body>
</html>
