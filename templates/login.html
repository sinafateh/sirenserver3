<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود — Siren Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg1: #1e1e2f;
            --bg2: #0a0a0f;
            --glass: rgba(30, 30, 40, 0.5);
            --text: #ffffff;
            --text-sec: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.2);
            --input: rgba(255, 255, 255, 0.1);
            --btn: #0a84ff;
            --btn-hover: #0063ce;
            --error: #ff453a;
            --success: #30d158;
        }
        body.light {
            --bg1: #e0e0e8;
            --bg2: #f5f5f7;
            --glass: rgba(255, 255, 255, 0.6);
            --text: #1c1c1e;
            --text-sec: rgba(0, 0, 0, 0.6);
            --border: rgba(0, 0, 0, 0.15);
            --input: rgba(0, 0, 0, 0.05);
            --btn: #007aff;
            --btn-hover: #0051d5;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, var(--bg1), var(--bg2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            transition: background 0.4s ease;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 48px;
            border: 0.5px solid var(--border);
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        body.light .glass-card {
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        }
        h2 {
            font-size: 32px;
            font-weight: 590;
            background: linear-gradient(135deg, var(--text), #bfbfd4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            font-size: 17px;
            background: var(--input);
            border: 0.5px solid var(--border);
            border-radius: 44px;
            color: var(--text);
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--btn);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
        }
        input::placeholder {
            color: var(--text-sec);
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--btn);
            border: none;
            border-radius: 44px;
            font-size: 18px;
            font-weight: 590;
            color: #fff;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        button:hover {
            background: var(--btn-hover);
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-box {
            background: rgba(255, 69, 58, 0.15);
            border: 0.5px solid var(--error);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 18px;
            color: var(--error);
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .theme-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 200;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 0.5px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            width: auto;
            margin: 0;
        }
        .theme-btn:hover {
            transform: scale(0.95);
        }
        .info-text {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-sec);
        }
        .info-text strong {
            color: var(--text);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌓 تغییر تم</button>

    <div class="glass-card">
        <h2>🔐 Siren Tester</h2>
        <div id="errorBox" class="error-box">❌ نام کاربری یا رمز عبور اشتباه است</div>

        <form id="loginForm">
            <input type="text" id="username" placeholder="نام کاربری" required autocomplete="username" value="sina">
            <input type="password" id="password" placeholder="رمز عبور" required autocomplete="current-password" value="sina">
            <button type="submit" id="loginBtn">
                <span id="loginText">ورود</span>
                <span id="loginLoader" style="display:none;" class="loading"></span>
            </button>
        </form>

        <div class="info-text">
            <p>👤 کاربر پیش‌فرض: <strong>sina</strong></p>
            <p>🔑 رمز: <strong>sina</strong></p>
            <p style="margin-top: 8px;">⭐ ادمین ارشد: sina</p>
        </div>
    </div>

    <script>
        // ==================== Theme ====================
        function toggleTheme() {
            document.body.classList.toggle('light');
            localStorage.setItem('siren-theme', document.body.classList.contains('light') ? 'light' : 'dark');
        }
        if (localStorage.getItem('siren-theme') === 'light') {
            document.body.classList.add('light');
        }

        // ==================== Login ====================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorBox = document.getElementById('errorBox');
            var loginBtn = document.getElementById('loginBtn');
            var loginText = document.getElementById('loginText');
            var loginLoader = document.getElementById('loginLoader');

            errorBox.style.display = 'none';
            loginBtn.disabled = true;
            loginText.textContent = 'در حال ورود...';
            loginLoader.style.display = 'inline-block';

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(response) {
                return response.json().then(function(data) {
                    if (!response.ok) {
                        throw new Error(data.detail || 'خطا در ورود');
                    }
                    return data;
                });
            })
            .then(function(data) {
                // ذخیره در LocalStorage
                localStorage.setItem('session_id', data.session_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('is_admin', data.is_admin);

                // رفتن به داشبورد
                window.location.href = '/dashboard';
            })
            .catch(function(error) {
                errorBox.textContent = '❌ ' + error.message;
                errorBox.style.display = 'block';
                loginBtn.disabled = false;
                loginText.textContent = 'ورود';
                loginLoader.style.display = 'none';
            });
        });

        // Enter key support
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
